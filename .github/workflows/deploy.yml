name: Bygg och deploya (GitHub Pages)

on:
  # Daglig generering 05:00 UTC = 06:00 Europe/Stockholm (vinter) / 07:00 (sommar).
  schedule:
    - cron: "0 5 * * *"
  # Deploya nar koden andras.
  push:
    branches: [main, claude/dagens-pod-app-9neig2]
  # Manuell korning – anvand for att seeda forsta tipset eller om-generera ett datum.
  workflow_dispatch:
    inputs:
      date:
        description: "Datum att generera (YYYY-MM-DD). Tomt = idag."
        required: false
        type: string
      force:
        description: "Tvinga om-generering aven om datumet redan finns."
        required: false
        type: boolean
        default: false
      backfill_start:
        description: "Fyll i alla datum fran detta (YYYY-MM-DD) t.o.m. 'date'/idag. Tomt = av."
        required: false
        type: string

permissions:
  contents: write   # generering committar dagens tips
  pages: write      # deploya till Pages
  id-token: write   # OIDC for deploy-pages

# Tillat bara en Pages-deploy at gangen; avbryt inte pagaende deploys.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Starta SearXNG (gratis, lokal web_search)
        if: ${{ github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' }}
        env:
          STAIK_API_KEY: ${{ secrets.STAIK_API_KEY }}
        run: |
          if [ -z "$STAIK_API_KEY" ]; then
            echo "::warning::STAIK_API_KEY saknas – hoppar over SearXNG och generering."
            exit 0
          fi
          docker run -d --name searxng -p 8080:8080 \
            -v "$GITHUB_WORKSPACE/searxng:/etc/searxng:ro" \
            -e "SEARXNG_BASE_URL=http://localhost:8080/" \
            searxng/searxng:latest
          echo "Vantar pa att SearXNG ska svara med JSON…"
          for i in $(seq 1 40); do
            if curl -sf "http://localhost:8080/search?q=test&format=json" >/dev/null 2>&1; then
              echo "SearXNG redo."
              exit 0
            fi
            sleep 2
          done
          echo "::warning::SearXNG blev inte redo i tid – generering kan misslyckas."
          docker logs searxng 2>&1 | tail -30 || true

      - name: Generera dagens tips
        if: ${{ github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' }}
        env:
          STAIK_API_KEY: ${{ secrets.STAIK_API_KEY }}
          SEARXNG_URL: http://localhost:8080
          GENERATE_DATE: ${{ inputs.date }}
          GENERATE_FORCE: ${{ inputs.force }}
          BACKFILL_START: ${{ inputs.backfill_start }}
        run: |
          if [ -z "$STAIK_API_KEY" ]; then
            echo "::warning::STAIK_API_KEY saknas som repo-secret – hoppar over genereringen."
          elif [ -n "$BACKFILL_START" ]; then
            end="${GENERATE_DATE:-$(TZ=Europe/Stockholm date +%F)}"
            d="$BACKFILL_START"
            echo "Backfill: $d t.o.m. $end"
            guard=0
            while :; do
              echo "--- genererar $d ---"
              GENERATE_DATE="$d" GENERATE_FORCE="" node scripts/generate.mjs || true
              [ "$d" = "$end" ] && break
              d=$(date -I -d "$d + 1 day")
              guard=$((guard + 1)); [ "$guard" -gt 60 ] && { echo "guard stop"; break; }
              sleep 2
            done
          else
            node scripts/generate.mjs
          fi

      - name: Spara nytt tips (commit)
        if: ${{ github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' }}
        run: |
          if [ -n "$(git status --porcelain public/data)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add public/data
            git commit -m "Dagens tips: $(TZ=Europe/Stockholm date +%Y-%m-%d)"
            git push
          else
            echo "Inget nytt tips att spara."
          fi

      - name: Konfigurera Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Ladda upp frontend som Pages-artefakt
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploya till GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
