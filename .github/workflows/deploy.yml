name: Bygg och deploya (GitHub Pages)

on:
  # Daglig generering 01:00 UTC = 02:00 Europe/Stockholm (vinter) / 03:00 (sommar).
  # Drivs av MiniMax (server-side sok + LLM) – billig token-plan, ingen OpenAI-kostnad.
  schedule:
    - cron: "0 1 * * *"
  # Deploya nar koden andras.
  push:
    branches: [main, claude/dagens-pod-app-9neig2]
  # Manuell korning – anvand for att seeda forsta tipset eller om-generera ett datum.
  workflow_dispatch:
    inputs:
      date:
        description: "Datum att generera (YYYY-MM-DD). Tomt = idag."
        required: false
        type: string
      force:
        description: "Tvinga om-generering aven om datumet redan finns."
        required: false
        type: boolean
        default: false
      backfill_start:
        description: "Fyll i alla datum fran detta (YYYY-MM-DD) t.o.m. 'date'/idag. Tomt = av."
        required: false
        type: string
      regen_dates:
        description: "Tvinga om-generering av dessa datum (komma-separerat, YYYY-MM-DD). Tomt = av."
        required: false
        type: string

permissions:
  contents: write   # generering committar dagens tips
  pages: write      # deploya till Pages
  id-token: write   # OIDC for deploy-pages

# Tillat bara en Pages-deploy at gangen; avbryt inte pagaende deploys.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Generera dagens tips
        if: ${{ github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' }}
        env:
          MINIMAX_API_KEY: ${{ secrets.MINIMAX_API_KEY }}
          GENERATE_DATE: ${{ inputs.date }}
          GENERATE_FORCE: ${{ inputs.force }}
          BACKFILL_START: ${{ inputs.backfill_start }}
          REGEN_DATES: ${{ inputs.regen_dates }}
        run: |
          if [ -z "$MINIMAX_API_KEY" ]; then
            echo "::warning::MINIMAX_API_KEY saknas som repo-secret – hoppar over genereringen."
          elif [ -n "$REGEN_DATES" ]; then
            echo "Om-genererar (force) datum: $REGEN_DATES"
            for d in $(echo "$REGEN_DATES" | tr ',' ' '); do
              echo "--- regenererar $d ---"
              GENERATE_DATE="$d" GENERATE_FORCE=true node scripts/generate.mjs || true
              sleep 2
            done
          elif [ -n "$BACKFILL_START" ]; then
            end="${GENERATE_DATE:-$(TZ=Europe/Stockholm date +%F)}"
            d="$BACKFILL_START"
            echo "Backfill: $d t.o.m. $end"
            guard=0
            while :; do
              echo "--- genererar $d ---"
              GENERATE_DATE="$d" node scripts/generate.mjs || true
              [ "$d" = "$end" ] && break
              d=$(date -I -d "$d + 1 day")
              guard=$((guard + 1)); [ "$guard" -gt 60 ] && { echo "guard stop"; break; }
              sleep 2
            done
          else
            node scripts/generate.mjs
          fi

      - name: Bygg SEO-/delningsartefakter + podd-RSS
        # Forrendera dagens tips i index.html + uppdatera sitemap/robots/RSS/manifest
        # och podd-RSS:en (podcast.xml fran lagrade ljud-enclosures). Deterministiskt:
        # andras bara nar datan andrats, sa det skapar ingen commit-brus pa deploy-push.
        # PODCAST_OWNER_EMAIL bakas in i podd-floden (kravs for Apple Podcasts-katalogen);
        # mejlen ar publik i floden, sa den ligger har avsiktligt.
        env:
          PODCAST_OWNER_EMAIL: Hugo@hammarstrand.uk
        run: |
          node scripts/build-seo.mjs
          node scripts/build-podcast.mjs

      - name: Spara nytt tips (commit)
        if: ${{ github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' }}
        run: |
          if [ -n "$(git status --porcelain public)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add public
            git commit -m "Dagens tips: $(TZ=Europe/Stockholm date +%Y-%m-%d)"
            git push
          else
            echo "Inget nytt tips att spara."
          fi

      - name: Konfigurera Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Ladda upp frontend som Pages-artefakt
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploya till GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
